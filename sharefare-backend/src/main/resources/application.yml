server:
  port: ${PORT:8080}

spring:
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  datasource:
    # Default to local H2 file DB so accounts survive backend restarts.
    # Override with DB_URL (or use `application-postgres.yml`) for production.
    url: ${DB_URL:jdbc:h2:file:./data/sharefare-local;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: ${JWT_SECRET:set-this-in-your-env-file-min-32-chars}
    ttlSeconds: ${JWT_TTL_SECONDS:86400}
  admin:
    email: ${ADMIN_EMAIL:admin@sharefare.com}
    password: ${ADMIN_PASSWORD:set-this-in-your-env-file}
  sampleData:
    enabled: ${SAMPLE_DATA_ENABLED:true}
    rides: ${SAMPLE_DATA_RIDES:9}
  brevo:
    apiKey: ${BREVO_API_KEY:}
    sender: ${BREVO_SENDER:ShareFare <no-reply@sharefare.local>}
  mail:
    supportEmail: ${MAIL_SUPPORT_EMAIL:sharefaree@gmail.com}
  frontendBaseUrl: ${FRONTEND_BASE_URL:http://localhost:5173}
  reminders:
    enabled: ${REMINDERS_ENABLED:true}
    fixedDelayMs: ${REMINDERS_FIXED_DELAY_MS:900000}
