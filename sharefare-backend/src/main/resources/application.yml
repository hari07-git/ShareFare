server:
  port: ${PORT:8080}

spring:
  datasource:
    # Default to in-memory H2 so the app boots without Postgres/Docker.
    # Override with DB_URL (or use `application-postgres.yml`) for production.
    url: ${DB_URL:jdbc:h2:mem:sharefare;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    ttlSeconds: ${JWT_TTL_SECONDS:86400}
  admin:
    email: ${ADMIN_EMAIL:admin@sharefare.com}
    password: ${ADMIN_PASSWORD:Admin@12345}
  sampleData:
    enabled: ${SAMPLE_DATA_ENABLED:true}
    rides: ${SAMPLE_DATA_RIDES:8}
