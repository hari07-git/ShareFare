server:
  port: ${PORT:8080}

spring:
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  datasource:
    # Default to local H2 file DB so accounts survive backend restarts.
    # Override with DB_URL (or use `application-postgres.yml`) for production.
    url: ${DB_URL:jdbc:h2:file:./data/sharefare-local;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${SPRING_MAIL_HOST:${SMTP_HOST:${MAIL_HOST:}}}
    port: ${SPRING_MAIL_PORT:${SMTP_PORT:${MAIL_PORT:587}}}
    username: ${SPRING_MAIL_USERNAME:${SMTP_USERNAME:${MAIL_USERNAME:}}}
    password: ${SPRING_MAIL_PASSWORD:${SMTP_PASSWORD:${MAIL_PASSWORD:}}}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:${SMTP_AUTH:${MAIL_SMTP_AUTH:true}}}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:${SMTP_STARTTLS:${MAIL_SMTP_STARTTLS_ENABLE:true}}}

app:
  jwt:
    secret: ${JWT_SECRET:set-this-in-your-env-file-min-32-chars}
    ttlSeconds: ${JWT_TTL_SECONDS:86400}
  admin:
    email: ${ADMIN_EMAIL:admin@sharefare.com}
    password: ${ADMIN_PASSWORD:set-this-in-your-env-file}
  sampleData:
    enabled: ${SAMPLE_DATA_ENABLED:true}
    rides: ${SAMPLE_DATA_RIDES:8}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:ShareFare <no-reply@sharefare.com>}
    supportEmail: ${MAIL_SUPPORT_EMAIL:sharefaree@gmail.com}
  frontendBaseUrl: ${FRONTEND_BASE_URL:http://localhost:5173}
  reminders:
    enabled: ${REMINDERS_ENABLED:true}
    fixedDelayMs: ${REMINDERS_FIXED_DELAY_MS:900000}
