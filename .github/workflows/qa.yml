name: ShareFare QA

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sharefare-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        run: mvn -q test

  frontend-qa:
    name: Frontend QA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sharefare-frontend
    env:
      VITE_API_BASE_URL: http://127.0.0.1:8080
      VITE_SENTRY_DSN: ""
      LH_PERFORMANCE_MIN: "0.85"
      LH_ACCESSIBILITY_MIN: "0.90"
      LH_BEST_PRACTICES_MIN: "0.90"
      LH_SEO_MIN: "0.80"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sharefare-frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build frontend
        run: npm run build

      - name: Desktop E2E tests
        run: npm run test:e2e

      - name: Mobile E2E tests
        run: npm run test:mobile

      - name: Lighthouse audits
        run: npm run lighthouse

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: sharefare-frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: sharefare-frontend/test-results
          if-no-files-found: ignore

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: sharefare-frontend/lighthouse-report
          if-no-files-found: ignore
